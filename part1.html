<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; background: #f7f7f5; font-family: 'DM Sans', sans-serif; color: #111; overflow: hidden; }

:root {
  --coral: #FF5733;
  --blue: #1B3FAB;
  --gold: #F5C842;
  --surface: #ffffff;
  --bg: #f7f7f5;
  --border: rgba(0,0,0,0.08);
  --text-dim: #888;
}

/* ── HEADER ── */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  background: #f7f7f5;
  padding: 52px 20px 14px;
}
.header-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.back-btn {
  width: 38px; height: 38px; border-radius: 50%;
  background: #fff; border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.07);
}
.back-btn:active { transform: scale(0.94); }
.event-pill {
  display: inline-flex; align-items: center; gap: 6px;
  background: #fff; border: 1px solid var(--border);
  border-radius: 20px; padding: 6px 14px;
  font-size: 13px; font-weight: 500; color: #111;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.header-title {
  font-family: 'Playfair Display', serif;
  font-size: 26px; font-weight: 900; color: #111; line-height: 1.1;
}
.header-sub { font-size: 13px; color: var(--text-dim); margin-top: 3px; }

/* ── GRID ── */
.grid-wrap {
  position: fixed; top: 160px; bottom: 0; left: 0; right: 0;
  overflow-y: auto; padding: 4px 20px 40px;
  -webkit-overflow-scrolling: touch;
}
.tpl-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 16px;
  max-width: 1200px;
  margin: 0 auto;
}

.tpl-card {
  background: #fff; border-radius: 16px;
  overflow: hidden; cursor: pointer;
  border: 1.5px solid var(--border);
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  transition: transform 0.15s ease, box-shadow 0.15s;
  aspect-ratio: 3/4; display: flex; flex-direction: column;
  position: relative;
}
.tpl-card:active { transform: scale(0.96); box-shadow: 0 1px 6px rgba(0,0,0,0.08); }

.tpl-preview { flex: 1; position: relative; overflow: hidden; }

/* hide on mobile touch devices */
::-webkit-scrollbar { display: none; }
* { scrollbar-width: none; }

/* show subtle scrollbar on desktop (mouse pointer) */
@media (pointer: fine) {
  ::-webkit-scrollbar { display: block; width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.18); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.32); }
  * { scrollbar-width: thin; scrollbar-color: rgba(0,0,0,0.18) transparent; }
}

.tpl-card { animation: fadeUp 0.4s ease both; }
.tpl-card:nth-child(1)  { animation-delay: 0.04s; }
.tpl-card:nth-child(2)  { animation-delay: 0.08s; }
.tpl-card:nth-child(3)  { animation-delay: 0.12s; }
.tpl-card:nth-child(4)  { animation-delay: 0.16s; }
.tpl-card:nth-child(5)  { animation-delay: 0.20s; }
.tpl-card:nth-child(6)  { animation-delay: 0.24s; }
.tpl-card:nth-child(7)  { animation-delay: 0.28s; }
.tpl-card:nth-child(8)  { animation-delay: 0.32s; }
.tpl-card:nth-child(9)  { animation-delay: 0.36s; }
.tpl-card:nth-child(10) { animation-delay: 0.40s; }
.tpl-card:nth-child(11) { animation-delay: 0.44s; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>

  <div class="header">

let selectedEvent = null;

function init() {
  const stored = localStorage.getItem('selectedEvent');
  selectedEvent = stored ? JSON.parse(stored) : { id:'birthday', emoji:'🎂', label:'Birthday' };
  const ev = EVENTS[selectedEvent.id] || EVENTS.birthday;
  ev.id = selectedEvent.id || 'birthday';
  document.getElementById('event-pill').textContent = `${ev.emoji} ${ev.label}`;
  renderGrid(ev);
}

function renderGrid(ev) {
  document.getElementById('tpl-grid').innerHTML = TEMPLATES.map(t => `
    <div class="tpl-card" onclick="selectTemplate(${t.id})">
      <div class="tpl-preview">${getPreview(t.id, ev)}</div>
    </div>
  `).join('');
}

function getPreview(id, ev) {
  const th = ev.theme;
  const { tag, txt } = getTplContent(id, ev);

  // ── T1: CLEAN MINIMAL TEXT ONLY ─────────────────────────────

      <div style="font-family:'Playfair Display',serif;font-size:16px;font-weight:700;font-style:italic;color:${th.darkText};line-height:1.2;margin-bottom:10px;">${tag}</div>

  // ── T4: VINTAGE POSTCARD ────────────────────────────────────
  if (id === 4) return `
    <div style="width:100%;height:100%;background:${th.paleBg};padding:8px;border:1px solid ${th.accentLight};display:flex;flex-direction:column;position:relative;overflow:hidden;">
      <svg style="position:absolute;top:8px;right:8px;width:32px;height:32px;stroke:${th.accent};stroke-width:1.5;fill:none;opacity:0.6;z-index:2;" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45"/><circle cx="50" cy="50" r="35" stroke-dasharray="4 4"/><text x="50" y="55" font-family="sans-serif" font-size="18" text-anchor="middle" fill="${th.accent}" stroke="none">1924</text></svg>
      <div style="width:100%;height:100px;border:3px solid ${th.cardBg};box-shadow:0 1px 5px rgba(0,0,0,0.1);margin-bottom:8px;overflow:hidden;flex-shrink:0;">
        <img src="${MALE}" style="width:100%;height:100%;object-fit:cover;object-position:top;display:block;"/>
      </div>
      <div style="font-family:'Shadows Into Light',cursive;font-size:15px;color:${th.darkText};margin-bottom:4px;">${tag}</div>
      <div style="font-family:'Special Elite',monospace;font-size:8px;color:${th.darkText};line-height:1.5;opacity:0.8;">${txt}</div>
    </div>`;

  // ── T5: MIDNIGHT DARK ARCH ──────────────────────────────────
  if (id === 5) return `
    <div style="width:100%;height:100%;background:${th.darkBg};padding:16px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;overflow:hidden;">
      <div style="width:80px;height:100px;border-radius:60px 60px 0 0;overflow:hidden;border:1.5px solid ${th.lightText};margin-bottom:14px;flex-shrink:0;">
        <img src="${FEMALE}" style="width:100%;height:100%;object-fit:cover;object-position:top;display:block;"/>
      </div>
      <div style="font-family:'Playfair Display',serif;font-size:${ev.id==='anniversary'?'13px':'16px'};font-weight:600;font-style:italic;color:${th.lightText};margin-bottom:8px;line-height:1.2;">${tag}</div>
      <div style="font-size:9px;line-height:1.6;color:${th.lightText};opacity:0.7;font-weight:300;">${txt}</div>
    </div>`;

  // ── T6: GLASSMORPHISM ───────────────────────────────────────
  if (id === 6) return `
    <div style="width:100%;height:100%;position:relative;overflow:hidden;display:flex;align-items:flex-end;">
      <div style="position:absolute;inset:0;">
        <img src="${FEMALE}" style="width:100%;height:100%;object-fit:cover;object-position:top;display:block;"/>
        <div style="position:absolute;inset:0;background:rgba(0,0,0,0.28);"></div>
      </div>
      <div style="position:relative;z-index:2;margin:8px;background:rgba(255,255,255,0.18);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.38);border-radius:8px;padding:8px;width:calc(100% - 16px);color:#fff;">
        <div style="font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;margin-bottom:3px;">${tag}</div>
        <div style="font-size:7px;line-height:1.4;opacity:0.9;">${txt}</div>
      </div>
    </div>`;

  // ── T7: CIRCLE SPLIT ────────────────────────────────────────
  if (id === 7) return `
    <div style="width:100%;height:100%;background:${th.paleBg};display:flex;flex-direction:column;align-items:center;padding:14px 12px;overflow:hidden;">
      <div style="position:relative;width:90%;height:42%;flex-shrink:0;">
        <div style="width:100%;height:100%;overflow:hidden;background:#eee;box-shadow:0 2px 8px rgba(0,0,0,0.08);">
          <img src="${MALE}" style="width:100%;height:100%;object-fit:cover;object-position:top;display:block;"/>
        </div>
        <div style="position:absolute;top:-8px;right:-8px;width:18px;height:18px;border-radius:50%;border:1.5px solid ${th.accent};background:${th.paleBg};z-index:3;display:flex;align-items:center;justify-content:center;">
          <div style="width:10px;height:10px;border-radius:50%;background:${th.accentLight};"></div>
        </div>
        <div style="position:absolute;bottom:-8px;left:-8px;width:18px;height:18px;border-radius:50%;border:1.5px solid ${th.accent};background:${th.paleBg};z-index:3;display:flex;align-items:center;justify-content:center;">
          <div style="width:10px;height:10px;border-radius:50%;background:${th.accentLight};"></div>
        </div>
        <div style="position:absolute;bottom:-8px;right:-8px;width:18px;height:18px;border-radius:50%;border:1.5px solid ${th.accent};background:${th.paleBg};z-index:3;display:flex;align-items:center;justify-content:center;">
          <div style="width:10px;height:10px;border-radius:50%;background:${th.accentLight};"></div>
        </div>
      </div>
      <div style="font-family:'Playfair Display',serif;font-size:16px;color:${th.darkText};margin-top:16px;text-align:center;">${tag}</div>
      <div style="font-family:'Montserrat',sans-serif;font-size:8px;color:${th.darkText};text-align:center;margin-top:6px;line-height:1.6;opacity:0.8;">${txt}</div>
    </div>`;

  // ── T8: POLAROID JOY ─────────────────────────────────────────
  if (id === 8) return `
    <div style="width:100%;height:100%;background:${th.paleBg};padding:10px;display:flex;flex-direction:column;align-items:center;overflow:hidden;">
      <div style="background:${th.cardBg};padding:4px 4px 14px;box-shadow:0 3px 10px rgba(0,0,0,0.1);transform:rotate(-2deg);width:80%;margin-top:4px;flex-shrink:0;">
        <div style="width:100%;height:75px;background:#eee;overflow:hidden;">
          <img src="${FEMALE}" style="width:100%;height:100%;object-fit:cover;object-position:top;display:block;"/>
        </div>
      </div>
      <div style="font-family:'Caveat',cursive;font-size:16px;color:${th.darkText};margin-top:10px;text-align:center;">${tag}!</div>
      <div style="font-family:'Nunito',sans-serif;font-size:7px;color:${th.darkText};text-align:center;margin-top:4px;line-height:1.4;padding:0 6px;opacity:0.8;">${txt}</div>
    </div>`;

  // ── T9: LETTER ────────────────────────────────────────────────
  if (id === 9) return `
    <div style="width:100%;height:100%;background:${th.paleBg};padding:14px;position:relative;overflow:hidden;">
      <div style="position:absolute;inset:8px;border:1px solid ${th.accentLight};pointer-events:none;"></div>
      <svg viewBox="0 0 50 150" fill="none" style="position:absolute;right:6px;top:26%;width:26px;height:85px;opacity:0.8;"><path d="M25,130 C25,130 25,30 25,10" stroke="${th.accent}" stroke-width="1.5"/><circle cx="25" cy="25" r="3" fill="${th.accent}"/><circle cx="22" cy="30" r="2.5" fill="${th.accent}"/><circle cx="28" cy="35" r="2.5" fill="${th.accent}"/><circle cx="20" cy="40" r="2.5" fill="${th.accent}"/><circle cx="30" cy="45" r="2.5" fill="${th.accent}"/><circle cx="22" cy="50" r="2.5" fill="${th.accent}"/><circle cx="28" cy="55" r="2.5" fill="${th.accent}"/><circle cx="25" cy="60" r="2.5" fill="${th.accent}"/><circle cx="25" cy="68" r="2" fill="${th.accent}"/><circle cx="25" cy="78" r="2" fill="${th.accent}"/><circle cx="25" cy="88" r="1" fill="${th.accent}"/><circle cx="25" cy="98" r="0.5" fill="${th.accent}"/></svg>
      <div style="font-family:'Caveat',cursive;font-size:11px;color:${th.darkText};opacity:0.6;margin-bottom:5px;">${new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' })}</div>
      <div style="font-family:'Caveat',cursive;font-size:22px;font-weight:500;color:${th.darkText};margin-bottom:8px;margin-top:4px;">${tag}</div>
      <div style="font-family:'Caveat',cursive;font-size:11px;line-height:1.75;color:${th.darkText};max-width:82%;opacity:0.9;">${txt}</div>
    </div>`;

  // ── T10: EXTENDED TEXT VINTAGE POLAROID ─────────────────────
  if (id === 10) return `
    <div style="width:100%;height:100%;background:${th.paleBg};display:flex;flex-direction:column;align-items:center;padding:10px;overflow:hidden;">
      <div style="width:70%;padding:4px 4px 12px;background:${th.cardBg};box-shadow:0 3px 10px rgba(0,0,0,0.08);transform:rotate(2deg);margin-bottom:8px;overflow:hidden;flex-shrink:0;">
        <img src="${MALE}" style="width:100%;height:60px;object-fit:cover;object-position:top;display:block;"/>
      </div>
      <div style="font-family:'Playfair Display',serif;font-size:12px;color:${th.darkText};margin-bottom:6px;width:100%;text-align:center;border-bottom:1px solid ${th.accentLight};padding-bottom:4px;">${tag}</div>
      <div style="font-family:'Montserrat',sans-serif;font-size:6.5px;color:${th.darkText};line-height:1.5;text-align:justify;opacity:0.85;">${txt}</div>
    </div>`;

  // ── T11: EXTENDED TEXT FLORAL CIRCLE ───────────────────────
  if (id === 11) return `
    <div style="width:100%;height:100%;background:${th.paleBg};display:flex;flex-direction:column;padding:12px;overflow:hidden;position:relative;">
      <div style="position:absolute;top:0;left:0;width:100%;height:30px;background:${th.accentLight};border-radius:0 0 50% 50%;"></div>
      <div style="font-family:'Alex Brush',cursive;font-size:18px;color:${th.accent};text-align:center;margin-top:16px;z-index:2;">${tag}</div>
      <div style="width:55px;height:55px;border-radius:50%;overflow:hidden;border:3px solid ${th.cardBg};box-shadow:0 3px 10px rgba(0,0,0,0.1);margin:6px auto;padding:0;flex-shrink:0;">
        <img src="${FEMALE}" style="width:100%;height:100%;object-fit:cover;object-position:top;display:block;"/>
      </div>
      <div style="font-family:'Montserrat',sans-serif;font-size:6.5px;color:${th.darkText};line-height:1.5;text-align:center;z-index:2;opacity:0.85;">${txt}</div>
    </div>`;

  return '';
}

function selectTemplate(id) {
  localStorage.setItem('selectedTemplate', id);
  const eventId = selectedEvent ? selectedEvent.id : 'birthday';
  window.location.href = `https://myheartnotes.onrender.com?t=${id}&e=${eventId}`;
}

init();
</script>
